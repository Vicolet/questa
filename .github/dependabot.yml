version: 2
updates:
  # Rust dependencies (Cargo.toml + Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  # GitHub Actions used in .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: scope
