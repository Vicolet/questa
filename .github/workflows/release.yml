name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artefact
        shell: bash
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          name="questa-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp README.md LICENSE CHANGELOG.md "$name/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/questa.exe" "$name/"
            7z a "$name.zip" "$name" >/dev/null
            echo "ASSET=$name.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/questa" "$name/"
            tar czf "$name.tar.gz" "$name"
            echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          generate_release_notes: true
